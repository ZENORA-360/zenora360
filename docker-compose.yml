# =============================================================================
# ZENORA - Docker Compose Production Stack
# =============================================================================
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f web    # Follow web logs
#   docker compose down           # Stop all services
#
# REQUIRED ENVIRONMENT VARIABLES (create .env file on server):
#   HARBOR_REGISTRY=harbor.yourserver.com
#   HARBOR_PROJECT=zenora
#   DOMAIN=zenora360.com
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Web Application (Nginx + React SPA)
  # ---------------------------------------------------------------------------
  web:
    image: ${HARBOR_REGISTRY:-harbor.local}/${HARBOR_PROJECT:-zenora}/zenora-web:latest
    container_name: zenora-web
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /var/log/nginx
    labels:
      - "com.zenora.service=web"
      - "com.zenora.version=1.0"
      - "com.centurylinklabs.watchtower.enable=true"