# =============================================================================
# ZENORA CI/CD Pipeline - Complete Production Workflow
# =============================================================================
#
# This pipeline implements a full CI/CD process:
#   Code → Lint/Test → Build → Docker → Scan → Sign → Push → Deploy → Monitor
#
# REQUIRED SECRETS (configure in GitHub → Settings → Secrets):
# -----------------------------------------------------------
# SONARQUBE_TOKEN        - SonarQube authentication token
# SONARQUBE_HOST_URL     - SonarQube server URL (e.g. https://sonar.yourserver.com)
# HARBOR_REGISTRY        - Harbor registry URL (e.g. harbor.yourserver.com)
# HARBOR_USERNAME        - Harbor robot account username
# HARBOR_PASSWORD        - Harbor robot account password
# HARBOR_PROJECT         - Harbor project name (e.g. zenora)
# COSIGN_PRIVATE_KEY     - Cosign private key for image signing
# COSIGN_PASSWORD        - Cosign private key password
# OVH_SSH_HOST           - OVH server IP or hostname
# OVH_SSH_USER           - SSH username for OVH server
# OVH_SSH_KEY            - SSH private key for OVH server (base64 or raw)
# OVH_SSH_PORT           - SSH port (default: 22)
# SLACK_WEBHOOK_URL      - (Optional) Slack webhook for notifications
#
# MANUAL SETUP STEPS:
# -------------------
# 1. SonarQube: Create a project on your SonarQube instance, generate a token
# 2. Harbor: Create a robot account with push/pull permissions
# 3. Cosign: Generate keypair with `cosign generate-key-pair`, store private key as secret
# 4. OVH: Set up SSH key-based auth on your OVH Cloud server
# 5. Gitleaks: No setup needed, uses GitHub Action directly
# 6. OWASP ZAP: No setup needed, runs as Docker container
# =============================================================================

name: "🚀 ZENORA CI/CD Pipeline"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  IMAGE_NAME: zenora-web
  DOCKER_BUILDKIT: 1

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Stage 1: Code Quality & Security Checks
  # ===========================================================================
  lint-and-test:
    name: "🔍 Lint, Test & Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube & Gitleaks

      - name: "📦 Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🔎 ESLint"
        run: bun run lint || true

      - name: "🧪 Unit Tests"
        run: bun run test || true

      - name: "🔐 Gitleaks - Secret Scanning"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # SonarQube SAST Analysis
  # ---------------------------------------------------------------------------
  sonarqube:
    name: "🛡️ SonarQube SAST"
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'
    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔬 SonarQube Scan"
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=zenora-web
            -Dsonar.projectName=ZENORA Web
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/*.test.*,**/dist/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  # ===========================================================================
  # Stage 2: Build & Containerize
  # ===========================================================================
  build-docker:
    name: "🐳 Build Docker Image"
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🏷️ Docker metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: "🔑 Login to Harbor Registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: "🔧 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🏗️ Build and Push Docker Image"
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ===========================================================================
  # Stage 3: Security Scanning
  # ===========================================================================
  scan-image:
    name: "🔒 Trivy Image Scan"
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: "🔑 Login to Harbor Registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: "🔍 Trivy Vulnerability Scan"
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest"
          format: "table"
          exit-code: "1"                      # Fail pipeline on findings
          severity: "HIGH,CRITICAL"           # Only block on HIGH/CRITICAL
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Dependency Scan (filesystem)
  # ---------------------------------------------------------------------------
  dependency-scan:
    name: "📦 Dependency Scan"
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🔍 Trivy Filesystem Scan"
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "HIGH,CRITICAL"

  # ===========================================================================
  # Stage 4: Sign Image (Cosign)
  # ===========================================================================
  sign-image:
    name: "✍️ Sign Image with Cosign"
    runs-on: ubuntu-latest
    needs: [build-docker, scan-image]
    steps:
      - name: "📦 Install Cosign"
        uses: sigstore/cosign-installer@v3

      - name: "🔑 Login to Harbor Registry"
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: "✍️ Sign the Docker Image"
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          # Sign the image using its digest for immutability
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            "${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}@${{ needs.build-docker.outputs.image_digest }}" \
            --yes

  # ===========================================================================
  # Stage 5: Deploy to OVH Cloud
  # ===========================================================================
  deploy:
    name: "🚀 Deploy to OVH Cloud"
    runs-on: ubuntu-latest
    needs: [sign-image]
    environment: production
    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "📦 Install Cosign"
        uses: sigstore/cosign-installer@v3

      - name: "✅ Verify Image Signature"
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          cosign verify --key env://COSIGN_PUBLIC_KEY \
            "${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}@${{ needs.build-docker.outputs.image_digest }}" || exit 1

      - name: "🚀 Deploy via SSH"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OVH_SSH_HOST }}
          username: ${{ secrets.OVH_SSH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          port: ${{ secrets.OVH_SSH_PORT || 22 }}
          script: |
            set -e
            
            echo "🔑 Logging into Harbor..."
            docker login ${{ secrets.HARBOR_REGISTRY }} \
              -u ${{ secrets.HARBOR_USERNAME }} \
              -p ${{ secrets.HARBOR_PASSWORD }}
            
            echo "📥 Pulling latest image..."
            docker pull ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:latest
            
            echo "🔄 Updating containers..."
            cd /opt/zenora  # Adjust to your deployment directory
            docker compose pull
            docker compose up -d --remove-orphans
            
            echo "🧹 Cleaning old images..."
            docker image prune -f
            
            echo "✅ Deployment complete!"

  # ===========================================================================
  # Stage 6: Post-Deploy DAST (OWASP ZAP)
  # ===========================================================================
  owasp-zap:
    name: "🕷️ OWASP ZAP DAST"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    continue-on-error: true  # Don't block pipeline on DAST findings
    steps:
      - name: "🕷️ OWASP ZAP Baseline Scan"
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://zenora360.com"
          rules_file_name: ".github/zap-rules.tsv"
          fail_action: false

      - name: "📤 Upload ZAP Report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

  # ===========================================================================
  # Notifications
  # ===========================================================================
  notify:
    name: "📢 Notify"
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: "📢 Slack Notification"
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy.result }}
          text: |
            🚀 ZENORA Deployment ${{ needs.deploy.result == 'success' && '✅ succeeded' || '❌ failed' }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}